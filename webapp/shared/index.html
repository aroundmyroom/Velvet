<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Velvet – Shared Playlist</title>
  <link rel="apple-touch-icon" sizes="180x180" href="../assets/fav/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32"  href="../assets/fav/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16"  href="../assets/fav/favicon-16x16.png">
  <link rel="stylesheet" href="/style.css?v=0.1.4">
  <style>
    /* ── Shared-page layout overrides ──────────────────────── */
    body {
      overflow-y: auto;
      min-height: 100vh;
      height: auto;
    }

    /* ── Page shell ─────────────────────────────────────────── */
    .sh-page {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      background: var(--bg);
    }

    /* ── Sticky header ──────────────────────────────────────── */
    .sh-header {
      position: sticky; top: 0; z-index: 50;
      display: flex; align-items: center; justify-content: space-between;
      padding: 13px 22px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .sh-brand { 
      display: flex; align-items: center; gap: 9px;
      font-size: 15px; font-weight: 700; letter-spacing: -.3px;
      color: var(--t1);
    }
    .sh-brand-sub { font-size: 12px; font-weight: 400; color: var(--t3); margin-left: 2px; }
    #sh-theme-btn {
      display: flex; align-items: center; justify-content: center;
      width: 34px; height: 34px; border-radius: 50%;
      background: var(--raised); border: 1px solid var(--border);
      color: var(--t2); transition: background .15s, color .15s;
    }
    #sh-theme-btn:hover { background: var(--hover); color: var(--t1); }
    .sh-theme-moon { display: var(--theme-icon-moon); }
    .sh-theme-sun  { display: var(--theme-icon-sun);  }

    /* ── Main content area ──────────────────────────────────── */
    .sh-main {
      max-width: 780px; width: 100%;
      margin: 0 auto;
      padding: 28px 20px 64px;
      display: flex; flex-direction: column; gap: 20px;
    }

    /* ── Now-playing hero ───────────────────────────────────── */
    .sh-hero {
      display: flex; align-items: center; gap: 22px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 20px;
    }
    .sh-art-wrap {
      width: 180px; height: 180px; flex-shrink: 0;
      border-radius: 12px; overflow: hidden;
      background: var(--raised);
      display: flex; align-items: center; justify-content: center;
    }
    .sh-art-wrap img { width: 100%; height: 100%; object-fit: cover; }
    .sh-art-wrap .no-art { width: 100%; height: 100%; border-radius: 12px; }
    .sh-meta { min-width: 0; flex: 1; }
    .sh-meta-count {
      font-size: 11px; font-weight: 700; letter-spacing: .7px;
      text-transform: uppercase; color: var(--primary); margin-bottom: 9px;
    }
    .sh-meta-title {
      font-size: 20px; font-weight: 700; color: var(--t1);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      letter-spacing: -.3px; line-height: 1.25;
    }
    .sh-meta-artist {
      font-size: 14px; color: var(--t2); margin-top: 5px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .sh-meta-album {
      font-size: 13px; color: var(--t3); margin-top: 3px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .sh-meta-year { font-size: 12px; color: var(--t3); margin-top: 2px; }

    /* ── Controls card ──────────────────────────────────────── */
    .sh-controls {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 16px 20px;
      display: flex; flex-direction: column; gap: 12px;
    }
    /* Override global player progress cursor hiding for shared page */
    .sh-controls .player-progress { cursor: auto; }
    .sh-controls .player-progress span { cursor: default; }
    .sh-controls .prog-track { cursor: pointer; }
    .sh-ctrl-row {
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .sh-aux-row { display: flex; align-items: center; gap: 10px; }

    /* Volume group */
    .sh-vol-wrap { display: flex; align-items: center; gap: 6px; flex: 1; min-width: 0; }
    #sh-mute-btn {
      display: flex; align-items: center; justify-content: center;
      width: 28px; height: 28px; border-radius: 6px; flex-shrink: 0;
      color: var(--t2); transition: background .14s, color .14s;
    }
    #sh-mute-btn:hover { background: var(--hover); color: var(--t1); }

    /* Download All */
    .sh-dl-all {
      display: flex; align-items: center; gap: 6px;
      padding: 7px 14px; border-radius: var(--r);
      background: var(--raised); border: 1px solid var(--border);
      color: var(--t2); font-size: 12px; font-weight: 500;
      transition: background .14s, color .14s, border-color .14s;
      flex-shrink: 0;
    }
    .sh-dl-all:hover { background: var(--hover); color: var(--t1); border-color: var(--border2); }

    /* ── Playlist card ──────────────────────────────────────── */
    .sh-playlist-wrap {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; overflow: hidden;
    }
    .sh-pl-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 13px 16px 11px;
      border-bottom: 1px solid var(--border);
    }
    .sh-pl-title { font-size: 13px; font-weight: 700; color: var(--t1); }
    .sh-pl-count { font-size: 12px; color: var(--t3); }
    .sh-pl-list  { padding: 6px; }

    /* Song rows */
    .sh-row {
      display: grid; grid-template-columns: 36px 48px 1fr auto;
      align-items: center; gap: 10px; padding: 8px 10px;
      border-radius: var(--r); cursor: pointer; transition: background .14s;
    }
    .sh-row:hover { background: var(--hover); }
    .sh-row.playing { background: var(--active); }
    .sh-row.playing .song-title { color: var(--primary); }
    .sh-row:hover .num-val       { opacity: 0; }
    .sh-row:hover .row-play-icon { opacity: 1; }
    .sh-row.playing .num-val     { opacity: 0; }
    .sh-row.playing .row-play-icon { opacity: 1; }
    .sh-row:hover .sh-row-dl { opacity: 1; }
    .sh-row-dl {
      opacity: 0;
      display: flex; align-items: center; justify-content: center;
      width: 28px; height: 28px; border-radius: 5px;
      color: var(--t2); transition: background .14s, color .14s, opacity .14s;
    }
    .sh-row-dl:hover { background: var(--raised); color: var(--t1); }

    /* Error / empty state */
    .sh-error {
      text-align: center; padding: 60px 24px;
      color: var(--t2); font-size: 15px; line-height: 1.7;
    }
    .sh-error strong { display: block; font-size: 20px; color: var(--t1); margin-bottom: 8px; }

    /* Toast override — no player bar below on this page */
    .toast { bottom: 20px !important; }

    /* ── Responsive ─────────────────────────────────────────── */
    @media (max-width: 560px) {
      .sh-hero { flex-direction: column; align-items: center; text-align: center; }
      .sh-art-wrap { width: 140px; height: 140px; }
      .sh-meta-title { font-size: 17px; }
      .sh-main { padding: 18px 10px 50px; }
    }
  </style>
</head>

<body>

<div class="sh-page">

  <!-- Header ──────────────────────────────────────────────── -->
  <header class="sh-header">
    <div class="sh-brand">
      <img src="/assets/img/velvet-logo.svg" alt="Velvet" width="32" height="32">
      Velvet
      <span class="sh-brand-sub">/ Shared Playlist</span>
    </div>
    <button id="sh-theme-btn" title="Toggle theme">
      <!-- Moon (dark mode) -->
      <svg class="sh-theme-moon" width="15" height="15" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
      <!-- Sun (light mode) -->
      <svg class="sh-theme-sun" width="15" height="15" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="5"/>
        <line x1="12" y1="1"  x2="12" y2="3"/>
        <line x1="12" y1="21" x2="12" y2="23"/>
        <line x1="4.22"  y1="4.22"  x2="5.64"  y2="5.64"/>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
        <line x1="1"  y1="12" x2="3"  y2="12"/>
        <line x1="21" y1="12" x2="23" y2="12"/>
        <line x1="4.22"  y1="19.78" x2="5.64"  y2="18.36"/>
        <line x1="18.36" y1="5.64"  x2="19.78" y2="4.22"/>
      </svg>
    </button>
  </header>

  <!-- Main ────────────────────────────────────────────────── -->
  <main class="sh-main" id="sh-main">

    <!-- Now-playing hero -->
    <div class="sh-hero">
      <div class="sh-art-wrap" id="sh-art-wrap">
        <div class="no-art">
          <div class="no-art-wave">
            <span></span><span></span><span></span><span></span><span></span>
          </div>
        </div>
      </div>
      <div class="sh-meta">
        <div class="sh-meta-count" id="sh-count">Loading…</div>
        <div class="sh-meta-title"  id="sh-title">—</div>
        <div class="sh-meta-artist" id="sh-artist"></div>
        <div class="sh-meta-album"  id="sh-album"></div>
        <div class="sh-meta-year"   id="sh-year"></div>
      </div>
    </div>

    <!-- Controls card -->
    <div class="sh-controls">

      <!-- Transport row -->
      <div class="sh-ctrl-row">
        <button id="sh-shuffle" class="ctrl-btn ctrl-sm" title="Shuffle">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="16,3 21,3 21,8"/>
            <line x1="4" y1="20" x2="21" y2="3"/>
            <polyline points="21,16 21,21 16,21"/>
            <line x1="4" y1="4" x2="9" y2="9"/>
          </svg>
        </button>
        <button id="sh-prev" class="ctrl-btn ctrl-nav" title="Previous">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
            <path d="M19 20L9 12l10-8v16z"/>
            <rect x="4" y="5" width="2.5" height="14" rx="1.25"/>
          </svg>
        </button>
        <button id="sh-play" class="ctrl-btn play-main" title="Play / Pause">
          <svg id="sh-icon-play" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
            <path d="M6 4l14 8-14 8V4z"/>
          </svg>
          <svg id="sh-icon-pause" width="20" height="20" viewBox="0 0 24 24"
               fill="currentColor" class="hidden">
            <rect x="5"  y="4" width="4" height="16" rx="1.5"/>
            <rect x="15" y="4" width="4" height="16" rx="1.5"/>
          </svg>
        </button>
        <button id="sh-next" class="ctrl-btn ctrl-nav" title="Next">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
            <path d="M5 4l10 8-10 8V4z"/>
            <rect x="17.5" y="5" width="2.5" height="14" rx="1.25"/>
          </svg>
        </button>
        <button id="sh-repeat" class="ctrl-btn ctrl-sm" title="Repeat">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="17,1 21,5 17,9"/>
            <path d="M3,11V9a4,4,0,0,1,4-4h14"/>
            <polyline points="7,23 3,19 7,15"/>
            <path d="M21,13v2a4,4,0,0,1-4,4H3"/>
          </svg>
        </button>
      </div>

      <!-- Progress row -->
      <div class="player-progress">
        <span id="sh-time-cur">0:00</span>
        <div id="sh-prog-track" class="prog-track">
          <div id="sh-prog-fill" class="prog-fill" style="width:0%">
            <div class="prog-thumb"></div>
          </div>
        </div>
        <span id="sh-time-total">0:00</span>
      </div>

      <!-- Volume + download row -->
      <div class="sh-aux-row">
        <div class="sh-vol-wrap">
          <button id="sh-mute-btn" title="Toggle mute">
            <svg id="sh-vol-high" width="16" height="16" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2">
              <polygon points="11,5 6,9 2,9 2,15 6,15 11,19"/>
              <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
              <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
            </svg>
            <svg id="sh-vol-low" width="16" height="16" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" class="hidden">
              <polygon points="11,5 6,9 2,9 2,15 6,15 11,19"/>
              <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
            </svg>
            <svg id="sh-vol-muted" width="16" height="16" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" class="hidden">
              <polygon points="11,5 6,9 2,9 2,15 6,15 11,19"/>
              <line x1="23" y1="9"  x2="17" y2="15"/>
              <line x1="17" y1="9"  x2="23" y2="15"/>
            </svg>
          </button>
          <input type="range" id="sh-vol" class="vol-slider" min="0" max="100" value="80">
        </div>
        <button id="sh-dl-all" class="sh-dl-all" title="Download all files">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7,10 12,15 17,10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          Download All
        </button>
      </div>

    </div><!-- /.sh-controls -->

    <!-- Playlist card -->
    <div class="sh-playlist-wrap">
      <div class="sh-pl-header">
        <span class="sh-pl-title">Playlist</span>
        <span class="sh-pl-count" id="sh-pl-count"></span>
      </div>
      <div class="sh-pl-list" id="sh-pl-list"></div>
    </div>

  </main>
</div><!-- /.sh-page -->

<div id="toast" class="toast hidden"></div>
<audio id="audio" preload="metadata"></audio>

<!-- Server injects sharedPlaylist here -->
<script type="application/json" id="sh-data"></script>

<script src="app.js?v=0.1.4"></script>
</body>
</html>
