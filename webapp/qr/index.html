<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Velvet — QR Connect</title>
  <meta name="referrer" content="no-referrer">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">

  <link rel="apple-touch-icon" sizes="180x180" href="/assets/fav/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/fav/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/fav/favicon-16x16.png">
  <link rel="shortcut icon" href="/assets/fav/favicon.ico">

  <script src="../assets/js/lib/qr.js"></script>
  <script src="../assets/js/lib/jwt-decode.js"></script>

  <style>
    :root {
      --bg:#1a1a2e; --surface:#16213e; --raised:#0f3460;
      --r:10px; --hover:rgba(255,255,255,.08);
      --border:#2a3a5e; --border2:#3a4e72;
      --accent:#60a5fa;
      --t1:#eeeeff; --t2:#8888b0; --t3:#6070a0;
    }
    :root.light {
      --bg:#f0f0f7; --surface:#ffffff; --raised:#f7f7fc;
      --border:rgba(0,0,0,.08); --border2:rgba(0,0,0,.13);
      --accent:#2563eb; --hover:rgba(0,0,0,.04);
      --t1:#0e0e1a; --t2:#555570; --t3:#9090a8;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--t1);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px 48px;
    }
    .page-header {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 28px; width: 100%; max-width: 460px;
    }
    .page-header svg { color: var(--accent); flex-shrink: 0; }
    .page-header h1 { font-size: 18px; font-weight: 600; color: var(--t1); }
    .page-header p  { font-size: 12px; color: var(--t2); margin-top: 1px; }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      width: 100%; max-width: 460px;
      padding: 24px; margin-bottom: 16px;
    }
    .field { margin-bottom: 16px; }
    .field:last-child { margin-bottom: 0; }
    label {
      display: block; font-size: 11px;
      text-transform: uppercase; letter-spacing: .06em;
      color: var(--t2); margin-bottom: 6px;
    }
    input[type="text"], input[type="password"] {
      width: 100%; background: var(--raised);
      border: 1px solid var(--border); border-radius: var(--r);
      color: var(--t1); font-size: 14px; padding: 9px 12px;
      outline: none; transition: border-color .18s, box-shadow .18s;
    }
    input[type="text"]:focus, input[type="password"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(96,165,250,.15);
    }
    input::placeholder { color: var(--t3); }
    .btn-primary {
      display: inline-flex; align-items: center; gap: 7px;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--r);
      padding: 9px 20px; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: opacity .15s;
      width: 100%; justify-content: center; margin-top: 20px;
    }
    .btn-primary:hover { opacity: .85; }
    .qr-wrap {
      display: flex; justify-content: center; align-items: center; min-height: 200px;
    }
    .qr-wrap svg {
      border-radius: 8px; background: #fff; padding: 12px;
      max-width: 240px; width: 100%; height: auto; display: block;
    }
    .qr-placeholder { color: var(--t3); font-size: 13px; text-align: center; }
    .hint { font-size: 12px; color: var(--t2); text-align: center; margin-top: 12px; }
    .theme-btn {
      position: fixed; top: 16px; right: 16px;
      background: var(--raised); border: 1px solid var(--border);
      border-radius: 50%; width: 34px; height: 34px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--t2);
      transition: color .15s, background .15s;
    }
    .theme-btn:hover { color: var(--t1); background: var(--hover); }
  </style>
</head>
<body>

  <button class="theme-btn" title="Toggle theme" onclick="toggleTheme()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="5"/>
      <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
      <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
      <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
      <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
    </svg>
  </button>

  <div class="page-header">
    <img src="/assets/img/velvet-logo.svg" alt="Velvet" width="32" height="32">
    <div>
      <h1>Velvet</h1>
      <p>QR Connect — scan to open the mobile app</p>
    </div>
  </div>

  <div class="card">
    <div class="field">
      <label>Server URL</label>
      <input type="text" id="server-url" placeholder="https://…" oninput="run()">
    </div>
    <div class="field">
      <label>Username</label>
      <input type="text" id="server-username" placeholder="Username" oninput="run()">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="server-password" placeholder="Password" oninput="run()">
    </div>
    <button class="btn-primary" onclick="run()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4"/>
      </svg>
      Regenerate
    </button>
  </div>

  <div class="card">
    <div class="qr-wrap" id="qr-output">
      <span class="qr-placeholder">Fill in all fields above to generate a QR code</span>
    </div>
    <p class="hint">Scan with the Velvet mobile app to connect instantly</p>
  </div>

  <script>
    function applyTheme(light) {
      document.documentElement.classList.toggle('light', light);
    }
    function toggleTheme() {
      const isLight = document.documentElement.classList.contains('light');
      localStorage.setItem('ms2_theme', isLight ? '' : 'light');
      applyTheme(!isLight);
    }
    applyTheme(localStorage.getItem('ms2_theme') === 'light');

    // Pre-fill username from GUIv2 session token
    const token = localStorage.getItem('ms2_token');
    if (token) {
      try {
        const decoded = jwt_decode(token);
        if (decoded.username) document.getElementById('server-username').value = decoded.username;
      } catch(e) { /* unreadable token, leave blank */ }
    }
    document.getElementById('server-url').value = window.location.origin;

    function run() {
      const url  = document.getElementById('server-url').value.trim();
      const user = document.getElementById('server-username').value.trim();
      const pass = document.getElementById('server-password').value;
      const out  = document.getElementById('qr-output');

      if (!url || !user || !pass) {
        out.textContent = '';
        var ph1 = document.createElement('span');
        ph1.className = 'qr-placeholder';
        ph1.textContent = 'Fill in all fields to generate a QR code';
        out.appendChild(ph1);
        return;
      }

      try {
        // Encode as a deep-link URL so phone cameras open the mobile PWA directly.
        // The credentials are in the hash (never sent to server) for privacy.
        const hash = encodeURIComponent('|' + url + '|' + user + '|' + pass);
        const deepLink = url + '/mobile/#qr=' + hash;
        const QRC = qrcodegen.QrCode;
        const qr  = QRC.encodeText(deepLink, QRC.Ecc.MEDIUM);
        const svgText = qr.toSvgString(2).replace(/<\?xml[^?]*\?>\s*/i, '');
        const parsed = new DOMParser().parseFromString(svgText, 'image/svg+xml');
        const svg = parsed.documentElement;
        out.textContent = '';
        if (svg && svg.nodeName.toLowerCase() === 'svg') {
          out.appendChild(svg);
        } else {
          var ph2 = document.createElement('span');
          ph2.className = 'qr-placeholder';
          ph2.textContent = 'Could not generate QR code';
          out.appendChild(ph2);
        }
      } catch(e) {
        out.textContent = '';
        var ph3 = document.createElement('span');
        ph3.className = 'qr-placeholder';
        ph3.textContent = 'Could not generate QR code';
        out.appendChild(ph3);
      }
    }

    run();
  </script>
</body>
</html>
