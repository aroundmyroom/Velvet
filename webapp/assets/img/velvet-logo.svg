             C 781 780, 786 180, 791 730
             C 796 230, 800 680, 804 280
             C 808 650, 812 310, 816 420
             C 820 510, 823 450, 826 460
             C 831 475, 836 480, 846 480
             L 860 480" 
          fill="none" stroke="#2bfce0" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" />
